services:
  db:
    image: mysql:8.0
    container_name: dote_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: admission_dote
      MYSQL_USER: dote_user
      MYSQL_PASSWORD: dote_password
    ports:
      - "3306:3306"
    volumes:
      - dote_db_data:/var/lib/mysql

  server:
    build: ./server
    container_name: dote_server
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_USER=dote_user
      - DB_PASS=dote_password
      - DB_NAME=admission_dote
      - DB_PORT=3306
      - JWT_SECRET=your_jwt_secret_here
      - JWT_EXPIRE=24h
      - COOKIE_EXPIRE=1
    depends_on:
      - db
    ports:
      - "5000:5000"
    volumes:
      - ./server/uploads:/usr/src/app/uploads

  client:
    build: ./client
    container_name: dote_client
    restart: always
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  dote_db_data:
