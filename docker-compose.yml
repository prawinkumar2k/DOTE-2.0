# ─── DOTE 2.0 — Production Docker Compose ───────────────────────────────────────
# Usage:
#   cp .env.example .env   (edit values)
#   docker compose up -d --build
#   docker compose logs -f

services:
  # ═══════════════════════════════════════════════════════════════════════════════
  # MySQL Database
  # ═══════════════════════════════════════════════════════════════════════════════
  db:
    image: mysql:8.0
    container_name: dote_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-admission_dote}
      MYSQL_USER: ${DB_USER:-dote_user}
      MYSQL_PASSWORD: ${DB_PASS:-dote_password}
    volumes:
      - dote_db_data:/var/lib/mysql
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    # NOT exposed to host — only accessible within Docker network
    # ports:
    #   - "3306:3306"   # ⚠️ Uncomment ONLY for local debugging
    networks:
      - dote_internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=256M
      --slow_query_log=1
      --slow_query_log_file=/var/lib/mysql/slow.log
      --long_query_time=2

  # ═══════════════════════════════════════════════════════════════════════════════
  # Backend (Node.js + Express)
  # ═══════════════════════════════════════════════════════════════════════════════
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dote_server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-dote_user}
      - DB_PASS=${DB_PASS:-dote_password}
      - DB_NAME=${DB_NAME:-admission_dote}
      - DB_POOL_LIMIT=${DB_POOL_LIMIT:-20}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-24h}
      - COOKIE_EXPIRE=${COOKIE_EXPIRE:-1}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      # Mail (optional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - SMTP_TLS_REJECT_UNAUTHORIZED=${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/uploads:/usr/src/app/uploads
    # NOT exposed to host — only Nginx talks to it
    # ports:
    #   - "5000:5000"   # ⚠️ Uncomment ONLY for local debugging
    networks:
      - dote_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ═══════════════════════════════════════════════════════════════════════════════
  # Frontend (React + Nginx reverse proxy)
  # ═══════════════════════════════════════════════════════════════════════════════
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: dote_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
    ports:
      - "${APP_PORT:-80}:80"
      # - "443:443"  # Uncomment when SSL is configured
    networks:
      - dote_internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ═══════════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  dote_db_data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════════
# Networks — isolated internal network
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  dote_internal:
    driver: bridge
